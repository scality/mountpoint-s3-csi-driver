name: Code Validation

on:
  push:
    branches:
      - '**'

jobs:
  validation:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: [style, unit, csi, controller]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Code formatting check
      if: matrix.test == 'style'
      run: make check_style

    - name: Unit tests
      if: matrix.test == 'unit'
      run: make test-unit

    - name: CSI spec compliance tests
      if: matrix.test == 'csi'
      run: make test-csi-compliance

    - name: Controller tests (K8s API mock)
      if: matrix.test == 'controller'
      run: make controller-integration-test

    - name: Upload unit test coverage to Codecov
      if: matrix.test == 'unit'
      continue-on-error: true
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: scality/mountpoint-s3-csi-driver

    - name: Upload controller test results to Codecov
      if: matrix.test == 'controller'
      continue-on-error: true
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./controller-integration-tests-results.xml
        flags: controller_integration_tests
        slug: scality/mountpoint-s3-csi-driver
